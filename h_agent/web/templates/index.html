<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>h-agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>h-agent</h1>
                <button class="btn-new-chat" id="newChatBtn">+ New Chat</button>
            </div>
            <div class="session-list" id="sessionList">
                <!-- Sessions loaded dynamically -->
            </div>
        </aside>

        <!-- Main chat area -->
        <main class="chat-main">
            <header class="chat-header">
                <span class="chat-title" id="chatTitle">New Chat</span>
                <div class="header-actions">
                    <div class="agent-selector">
                        <label for="agentSelect" class="agent-label">🤖</label>
                        <select id="agentSelect" class="agent-select">
                            <option value="__default__">默认助手</option>
                        </select>
                    </div>
                    <button class="btn-icon" id="clearBtn" title="Clear chat">🗑️</button>
                </div>
            </header>

            <div class="messages" id="messages">
                <div class="welcome-message">
                    <h2>Welcome to h-agent 🌐</h2>
                    <p>Your AI coding assistant. Ask me anything!</p>
                </div>
            </div>

            <footer class="chat-input-area">
                <form class="chat-form" id="chatForm">
                    <textarea 
                        id="messageInput" 
                        placeholder="Type your message..." 
                        rows="1"
                        autofocus
                    ></textarea>
                    <button type="submit" class="btn-send">➤</button>
                </form>
                <div class="input-hint">Press Enter to send, Shift+Enter for newline</div>
            </footer>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
